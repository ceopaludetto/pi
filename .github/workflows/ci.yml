name: CI
run-name: CI (${{ github.event.pull_request.title }})

on:
  pull_request:
    branches: [main]

env:
  CI: true
  DO_NOT_TRACK: 1

permissions:
  contents: read

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Setup Mise
        uses: jdx/mise-action@v4

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Lint
        run: bun turbo lint

      - name: Test
        run: bun turbo test
